name: keep-alive

# Pings the live Render demo so it doesn't cold-start for judges/visitors.
# Render's free tier sleeps after ~15 min idle; this hits /api/info to keep it warm.
# (GitHub-scheduled runs can be delayed a few minutes — for guaranteed warmth,
#  also point an uptime monitor like UptimeRobot at the same URL.)

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *" # ~every 10 min, off the :00 peak
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the live dashboard
        run: |
          URL="https://agora-j52a.onrender.com/api/info"
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 25
          done
          echo "did not get 200 (service may be waking) — best-effort, not failing the run"
