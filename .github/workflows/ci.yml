name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx hardhat compile
      # contract tests (22) + full end-to-end economy (boots a real local chain, asserts on-chain state)
      - run: npm test
