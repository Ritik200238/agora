# One-click-ish deploy of the live Agora dashboard on Render (https://render.com).
# Render assigns $PORT automatically; the server binds it. Works the same on Railway/Fly (Docker).
services:
  - type: web
    name: agora
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free # free 512MB, sleeps after ~15 min idle (wakes on visit). If the in-process EVM OOMs, bump to starter.
    healthCheckPath: /api/info
    envVars:
      - key: TICK_MS
        value: "1500"
